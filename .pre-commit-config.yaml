# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
-   repo: https://github.com/pycqa/isort
    rev: 9.0.0a3
    hooks:
    -   id: isort
        name: isort (python)
        args: [--line-length, '100', "--profile=black"]
-   repo: https://github.com/python/black
    rev: 26.5.1
    hooks:
    -   id: black
        exclude: "^(pixem/resources_rc.py)"
        args: [--line-length, '100']
-   repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.5
    hooks:
    -   id: clang-format
        exclude: "^(design/|pixel/|setup.py$|pixem/resources_rc.py)"
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
    -   id: ruff
        types_or: [ python, pyi ]
        args: [--line-length, '100', --fix, --exit-non-zero-on-fix]
        exclude: "^(design/|pixel/|setup.py$|pixem/resources_rc.py)"
-   repo: local
    hooks:
    -   id: unittest
        name: unittest
        entry: venv/bin/python -m unittest discover tests
        language: system
        pass_filenames: false
