name: Release Binary

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: pixem-linux.AppImage
          - os: windows-latest
            artifact_name: pixem-windows.exe
          - os: macos-latest
            artifact_name: pixem-macos.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compile Translations
        run: |
          pyside6-lrelease src/res/translations/en/pixem_en.ts
          pyside6-lrelease src/res/translations/es/pixem_es.ts

      - name: Generate Resources
        run: pyside6-rcc src/res/resources.qrc -o src/res/rc_resources.py

      - name: Generate Windows Icon
        if: matrix.os == 'windows-latest'
        run: |
          python -c "from PIL import Image; img = Image.open('src/res/logo512.png'); img.save('src/res/logo.ico', format='ICO', sizes=[(16, 16), (32, 32), (48, 48), (64, 64), (128, 128), (256, 256)])"

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: pyinstaller --clean --onefile --windowed --icon=src/res/logo.ico --name pixem src/main.py

      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: pyinstaller --clean --onefile --windowed --icon=src/res/Pixem.icns --name pixem src/main.py

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: pyinstaller --clean --onedir --windowed --name pixem src/main.py


      # Packaging
      - name: Package (Linux AppImage)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Install deps for appimagetool
          sudo apt-get install -y libfuse2 file

          # Setup AppDir structure
          mkdir -p AppDir/usr/bin
          cp -r dist/pixem/* AppDir/usr/bin/

          # Icon
          cp src/res/logo512.png AppDir/pixem.png

          # Desktop file
          cat > AppDir/pixem.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=Pixem
          Exec=pixem
          Icon=pixem
          Categories=Development;
          Terminal=false
          EOF

          # AppRun
          ln -s usr/bin/pixem AppDir/AppRun

          # Get AppImageTool
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          # Build AppImage
          # Use ARCH=x86_64 explicitly
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir dist/${{ matrix.artifact_name }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: Move-Item -Path dist/pixem.exe -Destination dist/${{ matrix.artifact_name }}

      - name: Code Sign and Notarize (macOS)
        if: matrix.os == 'macos-latest'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create entitlements.plist
          cat <<EOF > entitlements.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
          </dict>
          </plist>
          EOF

          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain

          # Decode and import certificate
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain

          # Get the identity (Developer ID Application)
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F '"' '{print $2}')

          if [ -z "$IDENTITY" ]; then
            echo "No Developer ID Application identity found. Listing all identities:"
            security find-identity -v -p codesigning
            exit 1
          fi

          echo "Signing with identity: $IDENTITY"

          # Code Sign
          /usr/bin/codesign --force --options runtime --entitlements entitlements.plist --timestamp --deep --sign "$IDENTITY" dist/pixem.app -v

          # Create temporary zip for notarization
          cd dist
          zip -r notarize.zip pixem.app
          cd ..

          # Notarize
          xcrun notarytool submit dist/notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple
          xcrun stapler staple dist/pixem.app

          # Cleanup
          rm certificate.p12 dist/notarize.zip entitlements.plist

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r ${{ matrix.artifact_name }} pixem.app
          cd ..

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
